# Quarkus configuration
quarkus.http.port=8080
quarkus.application.name=quarkus-demo

# Metrics configuration
quarkus.micrometer.enabled=true
quarkus.micrometer.binder-enabled-default=true

# OpenTelemetry configuration
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://opentelemetry-collector.monitoring.svc.cluster.local:4317
quarkus.otel.resource.attributes=service.name=quarkus-demo,service.version=1.0.0

# Health configuration
quarkus.smallrye-health.enabled=true
quarkus.smallrye-health.root-path=/health

# Logging configuration
quarkus.log.level=INFO
quarkus.log.console.enable=true

# Prometheus metrics endpoint
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics
